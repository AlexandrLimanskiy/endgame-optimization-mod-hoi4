l_russian:
 optimization_category:0 "Оптимизация производительности"
 optimization_category_desc:0 "Панель управления модом Endgame Performance Optimization. Удалено стран-призраков: £yellow§[?global.opt_gc_removed_total]£!§. Страны-призраки (без штатов, армии, флота и авиации) продолжают потреблять процессорное время на каждом тике — мод безопасно убирает их, не влияя на геймплей."
 opt_run_gc_now:0 "Провести глубокую очистку сейчас"
 opt_run_gc_now_desc:0 "Немедленно просканировать мир и удалить страны-призраки, не дожидаясь автоматической ежемесячной очистки."
 opt_run_gc_now_tt:0 "Все страны-призраки (без штатов, без войск, в мире, вне фракций) будут удалены из симуляции."
 opt_disable_gc:0 "Отключить автоматическую очистку"
 opt_disable_gc_desc:0 "Выключить ежемесячную сборку мусора. Используйте, если другой мод завязан на существование пустых стран."
 opt_disable_gc_tt:0 "Автоматическая ежемесячная очистка будет £red§отключена£!§."
 opt_enable_gc:0 "Включить автоматическую очистку"
 opt_enable_gc_desc:0 "Возобновить ежемесячную сборку мусора."
 opt_enable_gc_tt:0 "Автоматическая ежемесячная очистка будет £green§включена£!§."
 opt_enable_aggressive:0 "Включить агрессивный режим"
 opt_enable_aggressive_desc:0 "Постепенно утилизировать горы устаревшей пехотной экипировки 0-1 уровня на складах стран ИИ, которые уже массово владеют современными винтовками. Уменьшает объём складских записей в расчётах подкреплений, гарнизонов и ленд-лиза. ИИ всегда сохраняет резерв минимум ~2000 старых винтовок; игрока это не касается."
 opt_enable_aggressive_tt:0 "Каждый месяц страны ИИ будут утилизировать до 5000 устаревших винтовок (сохраняя гарнизонный резерв). £yellow§Немного уменьшает запас старого снаряжения у ИИ.£!§"
 opt_disable_aggressive:0 "Отключить агрессивный режим"
 opt_disable_aggressive_desc:0 "Прекратить утилизацию устаревших складов ИИ."
 opt_disable_aggressive_tt:0 "Агрессивная чистка складов будет £red§отключена£!§."
