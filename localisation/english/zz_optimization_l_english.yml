l_english:
 optimization_category:0 "Performance Optimization"
 optimization_category_desc:0 "Control panel of the Endgame Performance Optimization mod. Ghost countries removed so far: £yellow§[?global.opt_gc_removed_total]£!§. Ghost countries (no states, no army, no navy, no air force, at peace) keep consuming CPU on every tick — this mod safely removes them without affecting gameplay."
 opt_run_gc_now:0 "Run Deep Cleanup Now"
 opt_run_gc_now_desc:0 "Immediately sweep the world for ghost countries instead of waiting for the automatic monthly cleanup."
 opt_run_gc_now_tt:0 "All ghost countries (no states, no units, at peace, not in a faction) will be removed from the simulation."
 opt_disable_gc:0 "Disable Automatic Cleanup"
 opt_disable_gc_desc:0 "Turn off the monthly garbage collection of ghost countries. Use this if another mod relies on stateless tags."
 opt_disable_gc_tt:0 "Automatic monthly cleanup will be £red§disabled£!§."
 opt_enable_gc:0 "Enable Automatic Cleanup"
 opt_enable_gc_desc:0 "Resume the monthly garbage collection of ghost countries."
 opt_enable_gc_tt:0 "Automatic monthly cleanup will be £green§enabled£!§."
 opt_enable_aggressive:0 "Enable Aggressive Mode"
 opt_enable_aggressive_desc:0 "Gradually scrap mountains of obsolete tier 0-1 infantry equipment stockpiled by AI countries that already field large amounts of modern rifles. Reduces stockpile bookkeeping in reinforcement, garrison and lend-lease calculations. AI always keeps a reserve of at least ~2000 obsolete rifles; the player is never affected."
 opt_enable_aggressive_tt:0 "Each month the AI countries will scrap up to 5000 obsolete rifles (keeping a garrison reserve). £yellow§Slightly reduces the AI's pool of hand-me-down equipment.£!§"
 opt_disable_aggressive:0 "Disable Aggressive Mode"
 opt_disable_aggressive_desc:0 "Stop scrapping obsolete AI stockpiles."
 opt_disable_aggressive_tt:0 "Aggressive stockpile cleanup will be £red§disabled£!§."
